name: ci

on:
  push:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hiring_test
          POSTGRES_USER: hiring
          POSTGRES_PASSWORD: hiring
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hiring"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://hiring:hiring@localhost:5432/hiring_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type-check
        run: mypy app

      - name: Test with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=90
