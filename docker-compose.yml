services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hiring}
      POSTGRES_USER: ${POSTGRES_USER:-hiring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hiring}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://hiring:change-me@db:5432/hiring}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/code/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build: .
    entrypoint: ["streamlit", "run", "app/interface/ui/streamlit_app.py"]
    command: ["--server.address=0.0.0.0", "--server.port=8501"]
    environment:
      API_BASE_URL: http://app:8000
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
    ports:
      - "8501:8501"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
